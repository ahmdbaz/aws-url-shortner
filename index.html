<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>URL Shortener</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <div class="logo">
          <span>Trim<strong>Link</strong></span>
        </div>
      </header>

      <main>
        <div class="card">
          <h1>Shorten your link</h1>
          <p class="subtitle">
            Paste a long URL and get a clean, shareable link in seconds.
          </p>

          <form id="shorten-form" novalidate>
            <div class="input-group">
              <label for="url-input" class="visually-hidden">Long URL</label>
              <input
                id="url-input"
                type="url"
                placeholder="https://example.com/very/long/url/goes/here"
                autocomplete="off"
                spellcheck="false"
              />
              <button type="submit" id="shorten-btn">
                <span class="btn-text">Shorten</span>
                <span class="btn-spinner" aria-hidden="true"></span>
              </button>
            </div>
            <p id="error-msg" class="error" role="alert" aria-live="polite"></p>
          </form>

          <div id="result" class="result" aria-live="polite">
            <div class="result-label">Your short URL</div>
            <div class="result-row">
              <a
                id="short-url-link"
                href="#"
                target="_blank"
                rel="noopener noreferrer"
              ></a>
              <button
                id="copy-btn"
                class="copy-btn"
                title="Copy to clipboard"
                aria-label="Copy short URL"
              >
                <svg
                  id="copy-icon"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                  <path
                    d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                  ></path>
                </svg>
                <svg
                  id="check-icon"
                  class="hidden"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span id="copy-label">Copy</span>
              </button>
            </div>
          </div>
        </div>
      </main>

      <footer>
        <p>Built by <strong>Ahmed Mohammed Baz</strong></p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
